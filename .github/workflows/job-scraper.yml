name: Job Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      reset_store:
        description: "Treat every found job as new (forces email)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Restore seen-jobs state
        uses: actions/cache@v4.2.3
        with:
          path: .state
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DEBUG_SCREENSHOTS: "true"
        run: |
          RESET_FLAG=""
          if [ "${{ github.event.inputs.reset_store }}" = "true" ]; then
            RESET_FLAG="--reset-store"
          fi
          python -m job_scraper --verbose $RESET_FLAG

      - name: Upload debug screenshots (on zero-result runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_screenshots/
          if-no-files-found: ignore
          retention-days: 7
